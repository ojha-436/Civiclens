name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run tests
        run: npm test
      - name: Run type check (JSDoc via tsc --noEmit)
        run: |
          npm install --save-dev typescript
          npm run typecheck
      - name: Verify repo size (<10 MB)
        run: |
          SIZE=$(du -sb . --exclude=.git --exclude=node_modules | cut -f1)
          echo "Repo size: $SIZE bytes"
          if [ $SIZE -gt 10485760 ]; then
            echo "❌ Repo exceeds 10 MB limit"
            exit 1
          fi
          echo "✅ Repo size within 10 MB limit"

  validate-content:
    name: Content Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate JSON files
        run: |
          for f in public/data/*.json; do
            python3 -c "import json; json.load(open('$f'))" && echo "✓ $f"
          done
      - name: Verify no server-side secrets in code
        run: |
          # Scan all JS files for server-side secret patterns.
          # Firebase Web API keys (AIzaSy...) are intentionally committed — they are
          # public identifiers restricted by Firestore Security Rules + domain allowlist,
          # NOT server-side secrets. See SECURITY.md for details.
          if grep -rn "sk_live\|PRIVATE_KEY\|service_account\|client_secret" \
             --include="*.js" --include="*.json" \
             --exclude-dir=.git --exclude-dir=node_modules .; then
            echo "❌ Potential server-side secret found"
            exit 1
          fi
          echo "✅ No server-side secrets detected"
      - name: Verify Firestore rules exist
        run: |
          if [ ! -f firestore.rules ]; then
            echo "❌ firestore.rules missing — Firestore is unprotected"
            exit 1
          fi
          echo "✅ Firestore security rules present"
